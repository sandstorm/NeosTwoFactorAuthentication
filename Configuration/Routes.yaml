  httpMethods: ['POST']

- name: 'Sandstorm Two Factor Authentication - WebAuthn authenticate options'
  uriPattern: 'neos/second-factor-webauthn/authenticate-options'
  defaults:
      '@package': 'Sandstorm.NeosTwoFactorAuthentication'
      '@controller': 'Login'
      '@action': 'webAuthnAuthenticateOptions'
      '@format': 'json'
  httpMethods: ['POST']

- name: 'Sandstorm Two Factor Authentication - WebAuthn authenticate verify'
  uriPattern: 'neos/second-factor-webauthn/authenticate-verify'
  defaults:
      '@package': 'Sandstorm.NeosTwoFactorAuthentication'
      '@controller': 'Login'
      '@action': 'webAuthnAuthenticateVerify'
      '@format': 'json'
  httpMethods: ['POST']
