Neos:
  Neos:
    fusion:
      autoInclude:
        'Sandstorm.NeosTwoFactorAuthentication': true
    modules:
      management:
        submodules:
          twoFactorAuthentication:
            controller: 'Sandstorm\NeosTwoFactorAuthentication\Controller\BackendController'
            label: 'Sandstorm.NeosTwoFactorAuthentication:Backend:module.label'
            description: 'Sandstorm.NeosTwoFactorAuthentication:Backend:module.description'
            icon: 'fas fa-qrcode'
            additionalResources:
              styleSheets:
                - 'resource://Sandstorm.NeosTwoFactorAuthentication/Public/Styles/Login.css'
                - 'resource://Sandstorm.NeosTwoFactorAuthentication/Public/Styles/Backend.css'
              javaScripts:
                - 'resource://Sandstorm.NeosTwoFactorAuthentication/Public/index.js'
                - 'resource://Sandstorm.NeosTwoFactorAuthentication/Public/JavaScript/webauthn.js'

    userInterface:
      translation:
        autoInclude:
          'Sandstorm.NeosTwoFactorAuthentication':
            - '*'

      backendLoginForm:
        stylesheets:
          'Sandstorm.NeosTwoFactorAuthentication:AdditionalStyles': 'resource://Sandstorm.NeosTwoFactorAuthentication/Public/Styles/Login.css'
        scripts:
          'Sandstorm.NeosTwoFactorAuthentication:AdditionalScripts': 'resource://Sandstorm.NeosTwoFactorAuthentication/Public/index.js'
          'Sandstorm.NeosTwoFactorAuthentication:WebAuthnScripts': 'resource://Sandstorm.NeosTwoFactorAuthentication/Public/JavaScript/webauthn.js'

  Flow:
    http:
      middlewares:
        'secondFactorRedirectMiddleware':
          middleware: 'Sandstorm\NeosTwoFactorAuthentication\Http\Middleware\SecondFactorMiddleware'
          position: 'after securityEntryPoint'
    mvc:
      routes:
        'Sandstorm.NeosTwoFactorAuthentication': true

    security:
      authentication:
        providers:
          'Neos.Neos:Backend':
            requestPatterns:
              'Sandstorm.NeosTwoFactorAuthentication:SecondFactor':
                pattern: 'ControllerObjectName'
                patternOptions:
                  controllerObjectNamePattern: 'Sandstorm\NeosTwoFactorAuthentication\Controller\(LoginController|BackendController)'

Sandstorm:
  NeosTwoFactorAuthentication:
    # enforce 2FA for all users
    enforceTwoFactorAuthentication: false
    # enforce 2FA for specific authentication providers
    enforce2FAForAuthenticationProviders : []
    # enforce 2FA for specific roles
    enforce2FAForRoles: []
    # (optional) if set this will be used as a naming convention for the TOTP. If empty the Site name will be used
    issuerName: ''

    webAuthn:
      # Human-readable relying party name shown in the browser's WebAuthn prompt.
      relyingPartyName: 'Neos Backend'
      # Optional override for the relying party identifier. If null, the request's
      # hostname is used (which works for localhost and same-origin production deployments).
      relyingPartyId: null
      # 'required', 'preferred' or 'discouraged'.
      # 'discouraged' is the most permissive — works with FIDO U2F-only keys (e.g. YubiKey 4)
      # via the browser's U2F-compat fallback. Set to 'preferred' or 'required' to demand
      # PIN/biometric on the authenticator; note that 'required' excludes U2F-only keys.
      userVerification: 'discouraged'
      # 'none', 'indirect' or 'direct'. 'none' accepts any authenticator and skips attestation verification.
      attestation: 'none'
      # Browser ceremony timeout in milliseconds.
      timeout: 60000
      # Relying-party hostnames for which the server-side library should accept non-HTTPS
      # requests. The browser already treats *.localhost as a secure context (RFC 6761),
      # but the PHP validator only special-cases the literal 'localhost' — list any
      # additional dev hostnames here. Leave empty in production.
      securedRelyingPartyIds: []
