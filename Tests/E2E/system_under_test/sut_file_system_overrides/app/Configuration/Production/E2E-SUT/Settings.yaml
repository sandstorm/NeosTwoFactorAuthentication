Neos:
  Flow:
    persistence:
      backendOptions:
        driver: 'pdo_mysql'
        charset: 'utf8mb4'
        host: '%env:DB_NEOS_HOST%'
        port: '%env:DB_NEOS_PORT%'
        password: '%env:DB_NEOS_PASSWORD%'
        user: '%env:DB_NEOS_USER%'
        dbname: '%env:DB_NEOS_DATABASE%'
    cache:
      applicationIdentifier: 'app'

  Imagine:
    driver: Gd

Sandstorm:
  NeosTwoFactorAuthentication:
    webAuthn:
      # The SUT is served over http://localhost:8081. The WebAuthn library rejects
      # non-HTTPS origins ("Invalid scheme. HTTPS required.") unless the relying-party
      # hostname is explicitly trusted here. Production keeps this empty (HTTPS only);
      # for the E2E tests we trust localhost so the ceremony can run over http.
      securedRelyingPartyIds: ['localhost']
